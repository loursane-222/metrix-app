<!DOCTYPE html>
<html>
<body>
<button onclick="test()">AI TEST</button>

<pre id="out"></pre>

<script>
async function test() {
  const res = await fetch('/api/ai-sales', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      musteri: "ABC İnşaat",
      tutar: 120000,
      goruntulenme: 2,
      pdf: 1
    })
  });

  const text = await res.text();
  document.getElementById('out').innerText = text;
}
</script>
</body>
</html>
